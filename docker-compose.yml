services:
  api:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/worker.dockerfile
    env_file: .env
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  redis_data: