name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend (Express)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd ~/veda-ai-assingment
            git pull origin main
            npm install
            pm2 restart backend

  deploy-frontend:
    name: Deploy Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd ~/veda-ai-assingment/client
            git pull origin main
            npm install
            npm run build
            pm2 restart vedaai-frontend